name: "Setup Android Environment"
description: "Setup common Android development environment (JDK, SDK, hardware acceleration)"
inputs:
  jdk_version:
    description: "JDK version to install"
    required: false
    default: "17"
  jdk_distribution:
    description: "JDK distribution"
    required: false
    default: "zulu"
  android_packages:
    description: "Android SDK packages to install"
    required: false
    default: "tools platform-tools"

runs:
  using: "composite"
  steps:
    - name: Setup JDK ${{ inputs.jdk_version }}
      uses: actions/setup-java@v3
      with:
        distribution: ${{ inputs.jdk_distribution }}
        java-version: ${{ inputs.jdk_version }}

    - name: Remove preinstalled cmdline-tools (force pinned install)
      shell: bash
      run: |
        SDK="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-$HOME/.android/sdk}}"
        if [ -d "$SDK/cmdline-tools" ]; then
          echo "Removing $SDK/cmdline-tools so pinned cmdline-tools are not skipped."
          rm -rf "$SDK/cmdline-tools" 2>/dev/null || sudo rm -rf "$SDK/cmdline-tools"
        fi

    - name: Setup Android SDK
      uses: android-actions/setup-android@v4.0.1
      with:
        packages: ${{ inputs.android_packages }}
        cmdline-tools-version: 14742923

    - name: Enable Hardware Acceleration
      shell: bash
      run: |
        echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
        sudo udevadm control --reload-rules
        sudo udevadm trigger --name-match=kvm

    - name: Fix emulator directory permissions
      shell: bash
      run: sudo chown -R $(whoami):$(id -ng) /usr/local/lib/android/sdk/emulator/
