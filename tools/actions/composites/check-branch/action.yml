name: 'Check Branch Existence'
description: 'Check if a branch exists in the repository using GitHub API'

inputs:
  branch-name:
    description: 'Name of the branch to check'
    required: true
  repository:
    description: 'Repository name with owner (e.g., owner/repo)'
    required: true
    default: ${{ github.repository }}

outputs:
  exists:
    description: 'Boolean indicating if the branch exists (true/false)'
    value: ${{ steps.check-branch.outputs.exists }}

runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      id: check-branch
      with:
        result-encoding: string
        script: |
          try {
            const [owner, repo] = process.env.REPOSITORY.split('/');
            const branch = process.env.BRANCH_NAME;
            
            try {
              await github.rest.repos.getBranch({
                owner,
                repo,
                branch,
              });
              core.setOutput('exists', 'true');
              return 'true';
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('exists', 'false');
                return 'false';
              }
              throw error;
            }
          } catch (error) {
            core.setFailed(`Error checking branch: ${error.message}`);
          }
      env:
        REPOSITORY: ${{ inputs.repository }}
        BRANCH_NAME: ${{ inputs.branch-name }}
