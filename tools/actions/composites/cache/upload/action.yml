name: "Cache upload"
description: "Compress and upload cache files to S3"
inputs:
  endpoint:
    description: the S3 endpoint URL, e.g., 's3.amazonaws.com'
    type: string
    required: false
    default: 's3.amazonaws.com'
  key:
    type: string
    required: true
  path:
    type: string
    required: true
  accessKey:
    type: string
    required: true
  secretKey:
    type: string
    required: true
  sessionToken:
    type: string
    required: false
  bucket:
    type: string
    required: true
  region:
    type: string
    required: true
runs:
  using: "composite"
  steps:
    - name: Compressing files (Linux)
      shell: bash
      if: runner.os == 'Linux'
      run: |
        echo "Compressing files in ${{ inputs.path }}"
        for path in "${{ inputs.path }}"; do
          find "$path" -type f >> /tmp/cache-path.txt
        done
        /usr/bin/tar --posix -cf cache.tzst --exclude cache.tzst -P -C ${{ github.workspace }} --files-from /tmp/cache-path.txt --use-compress-program zstdmt

    - name: Compressing files (macOS)
      shell: bash
      if: runner.os == 'macOS'
      run: |
        echo "Compressing files in ${{ inputs.path }}"
        echo "${{ inputs.path }}" > /tmp/cache-path.txt
        gtar --posix --delay-directory-restore --use-compress-program zstdmt -P -C ${{ github.workspace }} -cf /tmp/cache.tzst -T /tmp/cache-path.txt

    - name: Uploading to S3
      shell: bash
      run: |
        echo "Uploading files to S3 bucket ${{ inputs.bucket }}"
        aws configure set default.s3.max_concurrent_requests 240
        aws configure set default.s3.multipart_chunksize 2MB
        aws s3 cp /tmp/cache.tzst s3://${{ inputs.bucket }}/${{ inputs.key }}/cache.tzst --endpoint-url https://${{ inputs.endpoint }} --region ${{ inputs.region }}
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.accessKey }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.secretKey }}
        AWS_SESSION_TOKEN: ${{ inputs.sessionToken }}

    - name: Cleanup
      shell: bash
      run: |
          echo "Cleaning up temporary files"
          rm -f /tmp/cache.tzst
          rm -f /tmp/cache-path.txt