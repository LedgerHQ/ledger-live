name: "Check for cache existence"
description: "Check if a cache object exists in S3"
inputs:
  bucket:
      description: "The S3 bucket to check"
      required: true
  key:
      description: "The S3 key to check"
      required: true
  aws-access-key-id:
      description: "AWS Access Key ID"
      required: true
  aws-secret-access-key:
    description: "AWS Secret Access Key"
    required: true
  aws-session-token:
    description: "AWS Session Token"
    required: true
outputs:
  object-exists:
    description: "Indicates if the object does exist"
    value: ${{ steps.object-check.outputs.object-exists }}
runs:
  using: "composite"
  steps:
    - name: "Check for object"
      id: object-check
      shell: bash
      run: |
        aws s3api head-object --bucket ${{ inputs.bucket }} --key ${{ inputs.key }} > /dev/null 2>&1 && exists=true
        if [ $exists ]; then
          echo "Cache file found"
          echo "object-exists=true" >> $GITHUB_OUTPUT
        else
          echo "Cache file not found"
          echo "object-exists=false" >> $GITHUB_OUTPUT
        fi
      env:
        AWS_ACCESS_KEY_ID: ${{ inputs.aws-access-key-id }}
        AWS_SECRET_ACCESS_KEY: ${{ inputs.aws-secret-access-key }}
        AWS_SESSION_TOKEN: ${{ inputs.aws-session-token }}