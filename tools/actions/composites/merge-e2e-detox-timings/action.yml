name: Merge Timing Files

description: Merge and cache E2E timing files for a given platform

inputs:
  platform:
    description: "Platform (ios or android)"
    required: true
  artifacts_dir:
    description: "Directory containing timing artifacts"
    required: false
    default: "e2e/mobile/artifacts"
  aws_access_key_id:
    description: "AWS access key ID"
    required: true
  aws_secret_access_key:
    description: "AWS secret access key"
    required: true
  aws_session_token:
    description: "AWS session token"
    required: true
  aws_region:
    description: "AWS region"
    required: true
  cache_bucket:
    description: "S3 cache bucket name"
    required: true
  github_ref:
    description: "GitHub ref for cache key"
    required: true
  github_run_id:
    description: "GitHub run ID for cache key"
    required: true
  roleName:
    description: "AWS IAM role name for cache access"
    required: false
  accountId:
    description: "AWS account ID for cache access"
    required: false
  key:
    description: "Cache key prefix for timing files"
    required: true
  test_results_prefix:
    description: "Name of the E2E test results artifact"
    required: true
  cache-develop-role-arn:
    description: "Full IAM OIDC role ARN for refs/heads/develop (optional; use with cache-branch-role-arn instead of accountId/roleName)"
    required: false
    default: ""
  cache-branch-role-arn:
    description: "Full IAM OIDC role ARN for non-develop refs (optional; use with cache-develop-role-arn)"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        repository: LedgerHQ/ledger-live
        sparse-checkout: |
          apps/ledger-live-mobile/scripts
          tools/nx

    - name: Setup the caches
      uses: LedgerHQ/ledger-live/tools/actions/composites/setup-caches@develop
      id: setup-caches
      with:
        skip-pnpm-cache: "true"
        skip-pod-cache: "true"
        skip-turbo-cache: "true"
        skip-nx-cache: "true"
        cache-develop-role-arn: ${{ inputs.cache-develop-role-arn }}
        cache-branch-role-arn: ${{ inputs.cache-branch-role-arn }}
        accountId: ${{ inputs.accountId }}
        roleName: ${{ inputs.roleName }}
        region: ${{ inputs.aws_region }}

    - name: Download timing files
      uses: actions/download-artifact@v4
      with:
        pattern: "${{ inputs.test_results_prefix }}-*"
        merge-multiple: true

    - name: Restore cached timing file
      uses: tespkg/actions-cache/restore@v1
      with:
        path: ${{ inputs.artifacts_dir }}/${{ inputs.test_results_prefix }}.json
        key: "${{ inputs.key }}"
        accessKey: ${{ inputs.aws_access_key_id }}
        secretKey: ${{ inputs.aws_secret_access_key }}
        sessionToken: ${{ inputs.aws_session_token }}
        bucket: ${{ inputs.cache_bucket }}
        region: ${{ inputs.aws_region }}
        use-fallback: false

    - name: Merge timing files
      shell: bash
      run: |
        apps/ledger-live-mobile/scripts/merge-timing-files.sh \
          --file-prefix "${{ inputs.test_results_prefix }}" \
          --artifacts-dir "${{ inputs.artifacts_dir }}" \
          --verbose

    - name: Copy merged timing file to artifacts dir
      shell: bash
      run: |
        mkdir -p ${{ inputs.artifacts_dir }}
        cp ./${{ inputs.test_results_prefix }}.json ${{ inputs.artifacts_dir }}/${{ inputs.test_results_prefix }}.json

    - name: Save merged timing file to cache
      uses: tespkg/actions-cache/save@v1
      with:
        path: ${{ inputs.artifacts_dir }}/${{ inputs.test_results_prefix }}.json
        key: "${{ inputs.key }}"
        accessKey: ${{ inputs.aws_access_key_id }}
        secretKey: ${{ inputs.aws_secret_access_key }}
        sessionToken: ${{ inputs.aws_session_token }}
        bucket: ${{ inputs.cache_bucket }}
        region: ${{ inputs.aws_region }}
        use-fallback: false
