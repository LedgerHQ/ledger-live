name: "[Desktop] - E2E Fund Monitor"
run-name: "E2E Fund Monitor • ${{ github.ref_name }}"

on:
  schedule:
    - cron: "0 4 * * 1,3,5" # Mon, Wed, Fri → Wallet 4.0
    - cron: "0 4 * * 2,4" # Tue, Thu → Legacy
  workflow_dispatch:
    inputs:
      ref:
        description: "Specify branch to checkout and test or leave blank to use the workflow branch"
        required: false
      test_filter:
        description: Filter pattern(s) to execute only selected test suites by test name, file path or tag, separated by ',' or '|' (e.g. "Accounts @smoke", "@bitcoin,@family-evm" or "Accounts @smoke|Settings")
        required: false
      invert_filter:
        description: Ignore test having name pattern (entered in the previous field)
        type: boolean
        default: false
      slack_notif:
        description: "Send notification to Slack?"
        required: false
        type: boolean
        default: false
      export_to_xray:
        description: Send tests results to Xray
        required: false
        type: boolean
        default: false
      test_execution:
        description: "Test Execution ticket ID"
        required: false
        type: string
      enable_broadcast:
        description: "Enable transaction broadcast"
        required: false
        type: boolean
        default: false
      build_type:
        description: "Firebase env to target (pick js for release testing)"
        required: false
        type: choice
        options:
          - js
          - staging
          - testing
        default: testing
      speculos_device:
        description: "Device to be used"
        required: false
        type: choice
        options:
          - nanoS
          - nanoSP
          - nanoX
          - stax
          - flex
          - nanoGen5
          - nanoSP and stax
        default: nanoSP
      smoke_tests:
        description: "Run smoke tests"
        required: false
        type: boolean
        default: false
      enable_wallet40:
        description: "Enable Wallet 4.0 feature"
        type: boolean
        default: false
      feature_flags_json:
        description: "JSON to override feature flags"
        required: false
        type: string
        default: ""

  workflow_call:
    inputs:
      ref:
        description: "Specify branch to checkout and test or leave blank to use the workflow branch"
        required: false
        type: string
      test_filter:
        description: Filter pattern(s) to execute only selected test suites by test name, file path or tag, separated by ',' or '|' (e.g. "Accounts @smoke", "@bitcoin,@evm" or "Accounts @smoke|Settings")
        required: false
        type: string
      invert_filter:
        description: Ignore test having name pattern (entered in the previous field)
        type: boolean
        default: false
      slack_notif:
        description: "Send notification to Slack?"
        required: false
        type: boolean
        default: false
      enable_broadcast:
        description: "Enable transaction broadcast"
        required: false
        type: boolean
        default: false
      build_type:
        description: "Firebase env to target (pick js for release testing)"
        required: false
        type: string
        default: testing
      speculos_device:
        description: "Device to be used"
        required: true
        type: string
      smoke_tests:
        description: "Run smoke tests"
        required: false
        type: boolean
        default: false
      enable_wallet40:
        description: "Enable Wallet 4.0 feature"
        type: boolean
        default: false
      feature_flags_json:
        description: "JSON to override feature flags"
        required: false
        type: string
        default: ""

permissions:
  id-token: write
  contents: read

jobs:
  fund-monitor:
    name: "Check e2e wallet balances"
    runs-on: [ledger-live-linux-e2e-speculos-32CPU-128RAM]
    timeout-minutes: 40
    env:
      NODE_OPTIONS: "--max-old-space-size=14336"
      FORCE_COLOR: 3
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: 1
      npm_config_loglevel: warn
      TURBO_TELEMETRY_DISABLED: 1
      DO_NOT_TRACK: 1
      SPECULOS_DEVICE: nanoSP
      SPECULOS_IMAGE_TAG: ghcr.io/ledgerhq/speculos:latest
      COINAPPS: ${{ github.workspace }}/coin-apps
      E2E_FEATURE_FLAGS_JSON: ${{ inputs.feature_flags_json || '' }}
    outputs:
      test_passed: ${{ steps.run-playwright.outputs.passed }}
      test_failed: ${{ steps.run-playwright.outputs.failed }}
      test_total: ${{ steps.run-playwright.outputs.total }}
      test_exit_code: ${{ steps.run-playwright.outputs.exit_code }}
    steps:
      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # 2.2.1
        with:
          app-id: ${{ secrets.GH_BOT_APP_ID }}
          private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          repositories: |
            ledger-live
            coin-apps

      - name: Checkout ledger-live
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: LedgerHQ/ledger-live
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 1

      - name: Checkout coin-apps (device firmware binaries)
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: LedgerHQ/coin-apps
          ref: master
          token: ${{ steps.generate-token.outputs.token }}
          path: coin-apps
          fetch-depth: 1

      - name: Setup caches
        uses: LedgerHQ/ledger-live/tools/actions/composites/setup-caches@develop
        with:
          use-mise: true
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          skip-turbo-cache: "false"
          accountId: ${{ secrets.AWS_ACCOUNT_ID_PROD }}
          roleName: ${{ secrets.AWS_CACHE_ROLE_NAME }}
          region: ${{ secrets.AWS_CACHE_REGION }}
          turbo-server-token: ${{ secrets.TURBOREPO_SERVER_TOKEN }}

      - name: Pull Speculos docker image
        run: docker pull ${{ env.SPECULOS_IMAGE_TAG }}

      - name: Install dependencies and build CLI
        run: |
          pnpm install --frozen-lockfile
          # Build only the CLI and its transitive dependencies — no LLD needed
          pnpm turbo run build --filter @ledgerhq/live-cli...

      - name: Run fund monitor spec
        run: |
          BASE_FILTER="${{ inputs.test_filter }}"
          if [ -n "$BASE_FILTER" ]; then
            BASE_FILTER="${BASE_FILTER//,/|}"
          fi
          if [ "${{ inputs.smoke_tests }}" = "true" ]; then
            if [ -n "$BASE_FILTER" ]; then
              echo "filter=@smoke $BASE_FILTER" >> $GITHUB_OUTPUT
            else
              echo "filter=@smoke" >> $GITHUB_OUTPUT
            fi
          else
            echo "filter=$BASE_FILTER" >> $GITHUB_OUTPUT
          fi
        shell: bash

      - name: Write workflow context to GitHub Summary
        run: |
          FILTER_PATTERN="${{ steps.test-filter.outputs.filter }}"
          DEVICE="$SPECULOS_DEVICE"
          BUILD_TYPE="${{ inputs.build_type || 'testing' }}"
          TEST_EXECUTION="${{ inputs.test_execution || '(not provided)' }}"
          BROADCAST_ENABLED="${{ inputs.enable_broadcast }}"
          EXTRA_FEATURE_FLAGS="$E2E_FEATURE_FLAGS_JSON"

          if [ -z "$FILTER_PATTERN" ]; then
            FILTER_PATTERN="(none)"
          fi
          if [ -z "$EXTRA_FEATURE_FLAGS" ]; then
            EXTRA_FEATURE_FLAGS="(none)"
          fi
          {
            echo "## Workflow Context"
            echo ""
            echo "- **Workflow source branch:** ${{ github.workflow_ref }}"
            echo "- **Triggered branch:** ${{ inputs.ref || github.ref_name }}"
            echo "- **Commit SHA:** ${{ github.sha }}"
            echo "- **Device selected:** $DEVICE"
            echo "- **Filtered pattern:** $FILTER_PATTERN"
            echo "- **Test Execution ticket ID:** $TEST_EXECUTION"
            echo "- **Firebase env to target:** $BUILD_TYPE"
            echo "- **Broadcast enabled:** $BROADCAST_ENABLED"
            echo "- **Extra feature flags:** $EXTRA_FEATURE_FLAGS"
          } >> $GITHUB_STEP_SUMMARY

      - name: Validate feature flags JSON input
        shell: bash
        run: |
          raw="$E2E_FEATURE_FLAGS_JSON"
          if [ -z "$raw" ]; then
            exit 0
          fi
          node -e '
            try {
              JSON.parse(process.argv[1]);
            } catch (error) {
              const message = error instanceof Error ? error.message : String(error);
              console.error(`Invalid E2E_FEATURE_FLAGS_JSON: ${message}`);
              process.exit(1);
            }
          ' "$raw"

      - name: Run Playwright E2E tests
        id: run-playwright
        uses: LedgerHQ/ledger-live/tools/actions/composites/run-e2e-playwright-tests@develop
        with:
          speculos_device: ${{ env.SPECULOS_DEVICE }}
          test_filter: ${{ steps.test-filter.outputs.filter }}
          invert_filter: ${{ inputs.invert_filter || false }}
          enable_wallet40: ${{ (github.event_name == 'schedule' && github.event.schedule == '0 4 * * 1,3,5') || inputs.enable_wallet40 || false }}
        env:
          SEED: ${{ secrets.SEED_QAA_B2C }}
          CI: "true"

      - name: Upload fund monitor artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: fund-monitor-artifacts
          path: |
            e2e/desktop/tests/artifacts/fund-monitor-report.json
            e2e/desktop/tests/artifacts/fund-monitor-slack-payload.json
          if-no-files-found: warn

      - name: Post Slack report
        if: always()
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d @${{ github.workspace }}/e2e/desktop/tests/artifacts/fund-monitor-slack-payload.json \
            ${{ secrets.SLACK_QAA_CHANNEL_ID }}
