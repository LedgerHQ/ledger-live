name: "[Wallet CLI] - Build - Called"

on:
  workflow_call:
    inputs:
      ref:
        type: string
        required: false
  workflow_dispatch:
    inputs:
      ref:
        description: |
          If you run this manually, and want to run on a PR, the correct ref should be refs/pull/{PR_NUMBER}/merge to
          have the "normal" scenario involving checking out a merge commit between your branch and the base branch.
          If you want to run only on a branch or specific commit, you can use either the sha or the branch name instead (prefer the first verion for PRs).
        type: string
        required: false

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  build-wallet-cli:
    strategy:
      fail-fast: false
      matrix:
        config:
          [
            { name: "Linux", os: "ubuntu-22.04", binary: "cli", artifact: "wallet-cli-linux-x64" },
            { name: "Windows", os: "windows-2022", binary: "cli.exe", artifact: "wallet-cli-windows-x64" },
            { name: "macOS", os: "macos-14", binary: "cli", artifact: "wallet-cli-darwin-arm64" },
          ]
    name: "${{ matrix.config.name }} Build"
    runs-on: ${{ matrix.config.os }}
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup the caches
        uses: LedgerHQ/ledger-live/tools/actions/composites/setup-caches@develop
        id: setup-caches
        with:
          use-mise: true
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          skip-turbo-cache: "false"
          accountId: ${{ secrets.AWS_ACCOUNT_ID_PROD }}
          roleName: ${{ secrets.AWS_CACHE_ROLE_NAME }}
          region: ${{ secrets.AWS_CACHE_REGION }}
          turbo-server-token: ${{ secrets.TURBOREPO_SERVER_TOKEN }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe4 # v2.0.2
        with:
          bun-version: "1.3.x"

      - name: Install dependencies
        run: pnpm i --filter "@ledgerhq/wallet-cli..." --filter "ledger-live"

      - name: Build wallet-cli
        env:
          TURBO_API: "http://127.0.0.1:${{ steps.setup-caches.outputs.port }}"
          TURBO_TOKEN: ${{ secrets.TURBOREPO_SERVER_TOKEN }}
          TURBO_TEAM: "foo"
        run: pnpm turbo build --filter "@ledgerhq/wallet-cli"

      - name: Upload ${{ matrix.config.name }} binary
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.config.artifact }}
          path: ${{ github.workspace }}/apps/wallet-cli/dist/${{ matrix.config.binary }}
