name: "[All Platforms] - Build and Test - PR"
on:
  merge_group:
    types: [checks_requested]
  pull_request: ~

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name != 'develop' && github.ref || github.run_id }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write
  actions: write

jobs:
  pre_job:
    name: "Skip Check"
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip == 'true' || steps.smartling_check.outputs.should_skip == 'true' }}
    env:
      IS_SMARTLING: ${{ startsWith(github.event.pull_request.head.ref, 'smartling-content-updated') == 'true' || startsWith(github.event.pull_request.head.ref, 'smartling-translation-completed') == 'true' }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: "never"
          skip_after_successful_duplicate: "true"
          do_not_skip: '["pull_request", "workflow_dispatch", "schedule"]'
      - id: smartling_check
        if: ${{ env.IS_SMARTLING == 'true' }}
        run: |
          echo "should_skip=true" >> $GITHUB_OUTPUT
          gh pr close ${{ github.event.pull_request.number }} -R LedgerHQ/ledger-live
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  determine-affected:
    name: "Turbo Affected"
    needs: pre_job
    if: ${{!github.event.pull_request.head.repo.fork && needs.pre_job.outputs.should_skip != 'true'}}
    uses: LedgerHQ/ledger-live/.github/workflows/turbo-affected-reusable.yml@develop
    with:
      head_branch: ${{ github.event.pull_request.head.ref || github.event.merge_group.head_ref }}
      base_branch: ${{ github.event.pull_request.base.ref || github.event.merge_group.base_ref }}

  log-affected:
    name: "Log Affected"
    needs: determine-affected
    runs-on: ubuntu-latest
    steps:
      - name: Process paths
        id: process_paths
        run: |
          paths="${{ needs.determine-affected.outputs.paths }}"
          modified_paths="${paths:1:-1}"
          echo "modified_paths=$modified_paths" >> $GITHUB_ENV

      - name: Log affected paths
        run: |
          echo "AFFECTED : ${{needs.determine-affected.outputs.affected}}"
          echo "PATHS : ${{needs.determine-affected.outputs.paths}}"
          echo "PACKAGES : ${{needs.determine-affected.outputs.packages}}"

          IFS=',' read -r -a paths_array <<< "${{env.modified_paths}}"
          for path in "${paths_array[@]}"
          do
            echo "$path"
          done

  # LLD
  build-desktop:
    name: "Build Desktop"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'ledger-live-desktop')}}
    uses: LedgerHQ/ledger-live/.github/workflows/build-desktop-reusable.yml@develop
    secrets: inherit

  test-desktop:
    name: "Test Desktop"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'ledger-live-desktop')}}
    uses: LedgerHQ/ledger-live/.github/workflows/test-desktop-reusable.yml@develop
    secrets: inherit

  # LLM
  build-mobile:
    name: "Build Mobile"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'ledger-live-mobile')}}
    uses: LedgerHQ/ledger-live/.github/workflows/build-mobile-reusable.yml@develop
    secrets: inherit

  test-mobile:
    name: "Test Mobile"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'ledger-live-mobile')}}
    uses: LedgerHQ/ledger-live/.github/workflows/test-mobile-reusable.yml@develop
    secrets: inherit

  test-mobile-e2e:
    name: "Test Mobile E2E"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'ledger-live-mobile')}}
    uses: LedgerHQ/ledger-live/.github/workflows/test-mobile-e2e-reusable.yml@develop
    secrets: inherit
    with:
      macos-specificity-runner-label: "performance-pool"

  # Tests
  test-libraries:
    name: "Test Libraries"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'libs')}}
    uses: LedgerHQ/ledger-live/.github/workflows/test-libs-reusable.yml@develop
    secrets: inherit

  test-design-system:
    name: "Test UI Libs"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'libs/ui')}}
    uses: LedgerHQ/ledger-live/.github/workflows/test-design-system-reusable.yml@develop
    secrets: inherit

  build-web-tools:
    name: "Build Web Tools"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'apps/web-tools')}}
    uses: LedgerHQ/ledger-live/.github/workflows/build-web-tools-reusable.yml@develop
    secrets: inherit

  test-cli:
    name: "Test CLI"
    needs: determine-affected
    if: ${{contains(needs.determine-affected.outputs.paths, 'apps/cli')}}
    uses: LedgerHQ/ledger-live/.github/workflows/test-cli-reusable.yml@develop
    secrets: inherit

  prepare-pr-analysis:
    name: "Prepare Pull Request Analysis"
    runs-on: ubuntu-latest
    needs:
      - build-mobile
      - test-mobile
      - build-desktop
      - test-desktop
      - test-libraries
    steps:
      - name: Prepare PR Analysis
        run: |
          paths="${{needs.determine-affected.outputs.paths}}"
          paths="${paths#[}"; paths="${paths%]}"
          IFS=',' read -r -a paths_array <<< "$paths"
          for path in "${paths_array[@]}"
          do
            echo "$path"
            cat $path/coverage/lcov.info >> ./lcov.info
            cat $path/coverage/sonar-executionTests-report.xml >> ./sonar-executionTests-report.xml
          done

  perform-pr-analysis:
    name: "SonarQube Pull Request Analysis"
    runs-on: ubuntu-latest
    needs: prepare-pr-analysis
    steps:
      - name: Process paths
        id: process_paths
        run: |
          paths="${{ needs.determine-affected.outputs.paths }}"
          modified_paths="${paths:1:-1}"
          echo "modified_paths=$modified_paths" >> $GITHUB_ENV

      - id: run_scan
        name: Run Scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.sources=${{env.modified_paths}}
            -Dsonar.testExecutionReportPaths=sonar-executionTests-report.xml

  # Final Check required
  ok:
    name: "OK"
    needs:
      - build-desktop
      - test-desktop
      - build-mobile
      - test-mobile
      - test-mobile-e2e
      - test-libraries
      - test-design-system
      - build-web-tools
      - test-cli
    runs-on: ubuntu-22.04
    if: always() && !cancelled()
    steps:
      - name: Check result
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1
