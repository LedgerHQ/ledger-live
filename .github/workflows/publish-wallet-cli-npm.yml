name: "[Wallet CLI] - Publish npm - Manual"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "the ref (branch or sha) to publish from"
        required: false
        default: main
      version_override:
        description: "optional version override (e.g. 1.2.0-nightly.20241015)"
        required: false
        default: ""
      registry:
        description: "JFrog npm registry path without protocol"
        required: false
        default: jfrog.ledgerlabs.net/artifactory/api/npm/ledgerlive-npm-sandbox-green

permissions:
  contents: read
  id-token: write

jobs:
  publish-wallet-cli-npm:
    name: Publish wallet-cli npm packages
    runs-on: ledger-live-4xlarge
    timeout-minutes: 45
    steps:
      - name: generate token
        id: generate-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # 2.2.1
        with:
          app-id: ${{ secrets.GH_BOT_APP_ID }}
          private-key: ${{ secrets.GH_BOT_PRIVATE_KEY }}
          repositories: |
            ledger-live
            ledger-live-build

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: ${{ inputs.ref || github.sha }}
          token: ${{ steps.generate-token.outputs.token }}

      - uses: actions/github-script@v7
        name: trigger wallet-cli sign and JFrog publish
        with:
          github-token: ${{ steps.generate-token.outputs.token }}
          script: |
            github.rest.actions.createWorkflowDispatch({
              owner: "ledgerhq",
              repo: "ledger-live-build",
              ref: "main",
              workflow_id: "nightly-wallet-cli.yml",
              inputs: {
                ref: "${{ inputs.ref || github.sha }}",
                version_override: "${{ inputs.version_override || '' }}",
                publish_to_jfrog: "true",
                jfrog_registry: "${{ inputs.registry || 'jfrog.ledgerlabs.net/artifactory/api/npm/ledgerlive-npm-sandbox-green' }}"
              }
            });
