name: "[Mobile] E2E Only"

on:
  schedule:
    - cron: "0 3 * * 1-5"
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch, tag, or SHA)
        required: false
      base_ref:
        description: Base branch to merge into for PR
        required: false
      tests_type:
        description: Tests type
        required: true
        type: choice
        default: "iOS & Android"
        options:
          - "Android Only"
          - "iOS Only"
          - "iOS & Android"
      enable_broadcast:
        description: Enable transaction broadcast
        required: false
        type: boolean
        default: false
      production_firebase:
        description: Target Firebase Production env
        required: false
        type: boolean
        default: false
      test_filter:
        description: Test name filter (space-separated)
        required: false
      export_to_xray:
        description: Send results to Xray
        required: false
        type: boolean
        default: false
      test_execution_android:
        description: Xray execution key for Android
        required: false
      test_execution_ios:
        description: Xray execution key for iOS
        required: false
      speculos_device:
        description: Speculos device to use
        required: true
        type: choice
        default: nanoSP
        options:
          - nanoS
          - nanoSP
          - nanoX

permissions:
  contents: read
  id-token: write

env:
  SPECULOS_IMAGE_TAG: ghcr.io/ledgerhq/speculos:master
  COINAPPS: ${{ github.workspace }}/coin-apps
  E2E_RUN: ${{ inputs.tests_type != 'Mocked' }}
  SHOULD_UPLOAD: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' || (github.event_name == 'push' && contains(fromJson('["develop","main"]'), github.ref_name)) }}
  SPECULOS_DEVICE: ${{ inputs.speculos_device }}

################################################################################
# 1) Install & cache deps
################################################################################
jobs:
  setup:
    name: Setup & Cache
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-deps.outputs.cache-key }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Install dependencies
        id: install-deps
        run: pnpm install --frozen-lockfile

      - name: Cache pnpm store
        id: cache-deps
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: pnpm-${{ hashFiles('pnpm-lock.yaml') }}

      - name: Set cache-key output
        run: echo "cache-key=${{ steps.cache-deps.outputs.cache-key }}" >> $GITHUB_OUTPUT

  ################################################################################
  # 2) Build iOS & Android in parallel
  ################################################################################
  build:
    name: Build Apps
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [ ios, android ]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Restore pnpm cache
        uses: actions/cache@v3
        with:
          path: ~/.pnpm-store
          key: ${{ needs.setup.outputs.cache-key }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build ${{ matrix.platform }}
        run: |
          if [ "${{ matrix.platform }}" = "ios" ]; then
            pnpm mobile e2e:ci -p ios -b $([[ "${{ inputs.production_firebase }}" == "true" ]] && printf %s '--production')
          else
            pnpm mobile e2e:ci -p android -b $([[ "${{ inputs.production_firebase }}" == "true" ]] && printf %s '--production')
          fi
        env:
          PRODUCTION: ${{ inputs.production_firebase }}

      - name: Upload ${{ matrix.platform }} build
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            ${{ matrix.platform == 'ios' && 'apps/ledger-live-mobile/ios/build/Build/Products/Release-iphonesimulator' || 
               'apps/ledger-live-mobile/android/app/build/outputs/apk/release' }}

  ################################################################################
  # 3) Sharded iOS Detox
  ################################################################################
  ios-e2e:
    name: iOS E2E Tests
    needs: build
    if: ${{ inputs.tests_type != 'Android Only' }}
    runs-on: macOS-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [ 1,2,3 ]
        total: [ 3 ]
    steps:
      - uses: actions/checkout@v4
      - name: Download iOS build
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: apps/ledger-live-mobile/ios/build/Build/Products/Release-iphonesimulator

      - name: Run iOS Detox shard ${{ matrix.shard }}/3
        id: run-ios
        run: pnpm mobile e2e:ci -p ios --shard ${{ matrix.shard }}/3 ${ inputs.test_filter && `--filter "${{inputs.test_filter}}"` || "" }
        env:
          SEED: ${{ secrets.SEED_QAA_B2C }}
          REMOTE_SPECULOS: "true"
          GITHUB_TOKEN: ${{ secrets.LL_SPECULOS_CI }}
          INPUT_E2E: ${{ env.E2E_RUN }}
          PRODUCTION: ${{ inputs.production_firebase }}
          INPUTS_TEST_FILTER: ${{ inputs.test_filter }}

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-test-artifacts-${{ matrix.shard }}
          path: e2e/mobile/artifacts

  ################################################################################
  # 4) Sharded Android Detox
  ################################################################################
  android-e2e:
    name: Android E2E Tests
    needs: build
    if: ${{ inputs.tests_type != 'iOS Only' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [ 1,2,3 ]
        total: [ 3 ]
    steps:
      - uses: actions/checkout@v4
      - name: Download Android build
        uses: actions/download-artifact@v4
        with:
          name: android-build
          path: apps/ledger-live-mobile/android/app/build/outputs/apk/release

      - name: Run Android Detox shard ${{ matrix.shard }}/3
        id: run-android
        run: pnpm mobile e2e:ci -p android --shard ${{ matrix.shard }}/3 ${ inputs.test_filter && `--filter "${{inputs.test_filter}}"` || "" }
        env:
          SEED: ${{ secrets.SEED_QAA_B2C }}
          INPUT_E2E: ${{ env.E2E_RUN }}
          PRODUCTION: ${{ inputs.production_firebase }}
          INPUTS_TEST_FILTER: ${{ inputs.test_filter }}

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-test-artifacts-${{ matrix.shard }}
          path: e2e/mobile/artifacts

  ################################################################################
  # 5) Allure Reports
  ################################################################################
  allure-ios:
    name: Allure Report iOS
    needs: ios-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Download iOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: ios-test-artifacts-*
      - name: Generate & upload Allure iOS
        uses: LedgerHQ/ledger-live/tools/actions/composites/upload-allure-report@develop
        if: ${{ env.SHOULD_UPLOAD }}
        with:
          platform: ios
          login: ${{ vars.ALLURE_USERNAME }}
          password: ${{ secrets.ALLURE_LEDGER_LIVE_PASSWORD }}
          path: e2e/mobile/artifacts

  allure-android:
    name: Allure Report Android
    needs: android-e2e
    runs-on: ubuntu-latest
    steps:
      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-test-artifacts-*
      - name: Generate & upload Allure Android
        uses: LedgerHQ/ledger-live/tools/actions/composites/upload-allure-report@develop
        if: ${{ env.SHOULD_UPLOAD }}
        with:
          platform: android
          login: ${{ vars.ALLURE_USERNAME }}
          password: ${{ secrets.ALLURE_LEDGER_LIVE_PASSWORD }}
          path: e2e/mobile/artifacts

  ################################################################################
  # 6) Xray Import
  ################################################################################
  xray:
    name: Import to Xray
    runs-on: ubuntu-latest
    needs: [ allure-ios, allure-android ]
    if: ${{ inputs.export_to_xray }}
    strategy:
      matrix:
        platform: [ ios, android ]
    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          path: artifacts-${{ matrix.platform }}
          pattern: "*-test-artifacts-*"
          merge-multiple: true
      - name: Format Xray payload
        run: e2e/mobile/xray.formater.sh artifacts-${{ matrix.platform }} ${{ matrix.platform }} ${{ matrix.platform == 'ios' && inputs.test_execution_ios || inputs.test_execution_android }}
      - name: Upload Xray JSON
        uses: actions/upload-artifact@v4
        with:
          name: xray-${{ matrix.platform }}
          path: artifacts-${{ matrix.platform }}/xray_report.json
      - name: Authenticate to Xray
        id: auth
        run: |
          token=$(curl -s -X POST "$XRAY_API_URL/authenticate" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"${{ secrets.XRAY_CLIENT_ID }}\",\"client_secret\":\"${{ secrets.XRAY_CLIENT_SECRET }}\"}")
          echo "xray_token=$token" >> $GITHUB_OUTPUT
      - name: Publish to Xray
        run: |
          curl -s -X POST "$XRAY_API_URL/import/execution" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.xray_token }}" \
            --data @artifacts-${{ matrix.platform }}/xray_report.json

  ################################################################################
  # 7) Slack Notification
  ################################################################################
  slack:
    name: Notify Slack
    needs: [ allure-ios, allure-android ]
    runs-on: ubuntu-latest
    if: ${{ env.SHOULD_UPLOAD }}
    steps:
      - name: Build Slack payload
        uses: actions/github-script@v7
        id: slack-msg
        with:
          script: |
            const iosStatus  = '${{ needs.allure-ios.outputs.result }}'  || 'no-results';
            const androidStatus = '${{ needs.allure-android.outputs.result }}' || 'no-results';
            const blocks = [
              { type: "header", text: { type: "plain_text", text: `Mobile E2E on ${{ github.ref_name }}` } },
              { type: "section", text: { type: "mrkdwn", text: `:apple: iOS: ${iosStatus}` } },
              { type: "section", text: { type: "mrkdwn", text: `:robot_face: Android: ${androidStatus}` } },
              { type: "context", elements: [{ type: "mrkdwn", text:`<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow>` }] }
            ];
            return JSON.stringify({ attachments:[{ color:"#36a64f", blocks }] });
      - name: Post to Slack
        uses: slackapi/slack-github-action@v1.23.0
        with:
          channel-id: "CTMQ0S5SB"
          payload: ${{ steps.slack-msg.outputs.result }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_USER_OAUTH_ACCESS_TOKEN }}
